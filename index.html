<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar -->
    <div class="container-fluid">
        <div class="row">
            <nav class="col-4 bg-dark text-white vh-100 sidebar">
                <h3 class="text-center py-3">My Portfolio</h3>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="projects.html">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="skills.html">Skills</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </nav>

            <main class="col-8">
                <section id="about" class="text-center py-5 bg-light">
                    <h1>Hi, I'm Joshua David</h1>
                    <p class="mt-4 px-5">I'm a web-developer. i have first hand experience in front-end prgramming languages such as HTML/CSS, JavaScript, React,etc</p>

    <script>
  // Select all nav links
  const navLinks = document.querySelectorAll('.nav-link');

  navLinks.forEach(link => {
    link.addEventListener('click', function() {
      // Remove 'active' class from all links
      navLinks.forEach(l => l.classList.remove('active'));
      // Add 'active' class to the clicked link
      this.classList.add('active');
    });
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
